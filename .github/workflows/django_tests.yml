name: Django tests + Mypy

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    # astral-sh/setup-uv has no Node 24 release yet (checkout@v5 / build-push@v6
    # are already Node 24), so force the one remaining Node 20 JS action onto
    # Node 24 to clear the runner's deprecation warning. Remove once setup-uv
    # ships a Node 24 build, or after 2026-06-16 when Node 24 is the runner default.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ['3.13']
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a health check
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v5
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    - name: Install additional libraries
      run: |
        sudo apt-get update
        sudo apt-get install binutils libproj-dev gdal-bin gettext
    - name: Install dependencies
      run: uv sync --frozen --python ${{ matrix.python-version }}
    - name: Show chrome version (for debugging purposes)
      run: google-chrome --version
    - name: Install frontend dependencies
      run: npm ci
    - name: Run vite build
      run: npm run vite-build
    - name: Install Playwright browsers
      run: uv run playwright install chromium --with-deps
    - name: Run tests
      run: uv run pytest
    - name: Run mypy
      # Minimum env to satisfy settings.py's validation block when
      # django-stubs loads djangoproject.settings during type checking.
      # Values are throwaway - mypy doesn't run code, just imports it.
      env:
        SECRET_KEY: mypy-not-for-runtime
        DJANGO_ALLOWED_HOSTS: localhost
        SITE_BASE_URL: http://localhost
        DATABASE_URL: postgis://postgres:postgres@127.0.0.1:5432/github_actions
      run: uv run mypy --install-types --non-interactive .
