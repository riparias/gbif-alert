name: Django tests + Mypy

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a health check
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install additional libraries
      run: |
        sudo apt-get update
        sudo apt-get install binutils libproj-dev gdal-bin gettext
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}-v10
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
    - name: Show chrome version (for debugging purposes)
      run: google-chrome --version
    - name: Install frontend dependencies
      run: npm install
    - name: Run vite build
      run: npm run vite-build
    - name: Install Playwright browsers
      run: |
        source .venv/bin/activate
        playwright install chromium --with-deps
    - name: Run tests
      run: |
        source .venv/bin/activate
        pytest
    - name: Run mypy
      # Minimum env to satisfy settings.py's validation block when
      # django-stubs loads djangoproject.settings during type checking.
      # Values are throwaway - mypy doesn't run code, just imports it.
      env:
        SECRET_KEY: mypy-not-for-runtime
        DJANGO_ALLOWED_HOSTS: localhost
        SITE_BASE_URL: http://localhost
        DATABASE_URL: postgis://postgres:postgres@127.0.0.1:5432/github_actions
      run: poetry run mypy --install-types --non-interactive .
