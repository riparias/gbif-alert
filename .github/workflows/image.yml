name: Build image

on:
  push:
    branches: [main, devel]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Redeploy the demo instance once a fresh `devel` image is in the
  # registry. Fires only after `build` pushes it - never on PRs or `main`.
  deploy-demo:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/devel'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy (demo)
        run: curl -fsS --retry 3 -X POST "${{ secrets.DOKPLOY_DEMO_DEPLOY_WEBHOOK }}"
