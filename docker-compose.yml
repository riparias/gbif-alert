version: '3'

services:
  nginx:
    image: niconoe/gbif-alert-nginx:1.9.0
    ports:
      - "1337:80"
    depends_on:
      - gbif-alert
    volumes:
      - static_volume:/app/staticfiles
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=gbif-alert-db
      - POSTGRES_USER=gbif-alert-db
      - POSTGRES_DB=gbif-alert-db
    healthcheck:
      test: ['CMD-SHELL', 'psql -h localhost -U $${POSTGRES_USER} -c select 1 -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.0.12
    expose:
      - 6379
  gbif-alert:
    image : niconoe/gbif-alert:1.9.0
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    volumes:
      - static_volume:/app/staticfiles
      - type: bind
        source: ./local_settings_docker.py
        target: /app/djangoproject/local_settings_docker.py
        read_only: true
  rqworker:
    image: niconoe/gbif-alert:1.9.0
    entrypoint: poetry run python manage.py rqworker default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles
      - type: bind
        source: ./local_settings_docker.py
        target: /app/djangoproject/local_settings_docker.py
        read_only: true

  # ---------------------------------------------------------------------------
  # Periodic data import jobs (run via host cron or a scheduler of your choice)
  #
  # Recommended crontab (host machine):
  #
  #   # GBIF import — nightly at 02:00
  #   0 2 * * * cd /path/to/instance && docker compose exec -T gbif-alert poetry run python manage.py import_observations
  #
  #   # iNaturalist import — nightly at 04:00 (after GBIF import finishes)
  #   # Requires INAT_IMPORT_CONFIG["ENABLED"] = True in local_settings_docker.py
  #   # Run sync_inat_taxon_ids once after adding new species:
  #   #   docker compose exec gbif-alert poetry run python manage.py sync_inat_taxon_ids
  #   0 4 * * * cd /path/to/instance && docker compose exec -T gbif-alert poetry run python manage.py import_inat_observations
  #
  #   # Email notifications — daily at 06:00
  #   0 6 * * * cd /path/to/instance && docker compose exec -T gbif-alert poetry run python manage.py send_alert_notifications_email
  # ---------------------------------------------------------------------------

volumes:
  postgres_data:
  static_volume: