# Production-only docker-compose for gbif-alert.
#
# Usage:
#   docker compose up -d                          # external Postgres (set DATABASE_URL)
#   docker compose --profile bundled-db up -d     # postgis service in compose
#
# All configuration via env vars - see .env.example for the contract.

x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  DEBUG: ${DEBUG:-False}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS is required}
  SITE_BASE_URL: ${SITE_BASE_URL:?SITE_BASE_URL is required}
  SITE_NAME: ${SITE_NAME:?SITE_NAME is required}
  RQ_REDIS_URL: ${RQ_REDIS_URL:-redis://valkey:6379/0}
  EMAIL_HOST: ${EMAIL_HOST:-localhost}
  EMAIL_PORT: ${EMAIL_PORT:-25}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-False}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
  SERVER_EMAIL: ${SERVER_EMAIL:-}
  ADMINS: ${ADMINS:-}
  GBIF_DOWNLOAD_USERNAME: ${GBIF_DOWNLOAD_USERNAME:-}
  GBIF_DOWNLOAD_PASSWORD: ${GBIF_DOWNLOAD_PASSWORD:-}
  GBIF_DOWNLOAD_COUNTRY: ${GBIF_DOWNLOAD_COUNTRY:-}
  GBIF_DOWNLOAD_YEAR_MIN: ${GBIF_DOWNLOAD_YEAR_MIN:-}
  ENABLED_LANGUAGES: ${ENABLED_LANGUAGES:-en,fr,nl}
  PRIMEVUE_PRIMARY_PALETTE: ${PRIMEVUE_PRIMARY_PALETTE:-indigo}
  MAP_INITIAL_ZOOM: ${MAP_INITIAL_ZOOM:-2}
  MAP_INITIAL_LAT: ${MAP_INITIAL_LAT:-0}
  MAP_INITIAL_LON: ${MAP_INITIAL_LON:-0}
  TIME_ZONE: ${TIME_ZONE:-Europe/Brussels}

# Image tag is operator-controlled: pin to a specific version (`:1.10.0`)
# for stable deploys, or track a moving tag (`:devel`, `:latest`) for
# auto-redeploy via registry polling. Inlined into each service (instead
# of a YAML anchor) because some docker-compose implementations
# (notably Dokploy's) do not interpolate `${VAR}` inside `x-*` extension
# fields, which silently leaves the default value in every service.

services:

  migrate:
    image: ghcr.io/riparias/gbif-alert:${GBIF_ALERT_TAG:-1.10.0}
    # Always check the registry on `docker compose up`. Without this, moving
    # tags like `devel` are never re-pulled because the image reference
    # string is unchanged - the local cached layer is silently reused.
    pull_policy: always
    command: python manage.py migrate --noinput
    environment: *app-env
    networks: [default, shared]
    depends_on:
      db:
        condition: service_healthy
        required: false
    restart: "no"

  gbif-alert:
    image: ghcr.io/riparias/gbif-alert:${GBIF_ALERT_TAG:-1.10.0}
    pull_policy: always
    # Dockerfile CMD reads ${GUNICORN_WORKERS:-3} at runtime.
    environment:
      <<: *app-env
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    networks: [default, shared]
    expose:
      - "8000"
    ports:
      - "${GBIF_ALERT_BIND:-127.0.0.1:8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    init: true
    labels:
      # ofelia (in-stack scheduler) - see the `scheduler` service.
      ofelia.enabled: "true"
      # Ofelia's cron parser (robfig/cron v1) expects SIX fields with the
      # leading one being seconds: "second minute hour day month dayofweek".
      # A 5-field expression silently shifts left and runs hourly. So
      # "0 0 2 * * *" = 02:00:00 daily, NOT "0 2 * * *".
      ofelia.job-exec.import-observations.schedule: "${IMPORT_OBSERVATIONS_SCHEDULE:-0 0 2 * * *}"
      ofelia.job-exec.import-observations.command: "python manage.py import_observations"
      ofelia.job-exec.import-observations.no-overlap: "true"
      ofelia.job-exec.send-notifications.schedule: "${SEND_NOTIFICATIONS_SCHEDULE:-0 0 14 * * *}"
      ofelia.job-exec.send-notifications.command: "python manage.py send_alert_notifications_email"
      ofelia.job-exec.send-notifications.no-overlap: "true"
      # Traefik routing (Dokploy and any other Traefik-fronted host).
      # Non-Traefik deploys (plain docker compose, ECS) ignore these
      # labels entirely - they sit as inert metadata. Set
      # `PUBLIC_DOMAIN` in the env when behind Traefik.
      #
      # Router/service name is hardcoded because compose does not
      # interpolate `${VAR}` in label keys. Running multiple instances
      # behind the same Traefik would conflict on the router name.
      traefik.enable: "true"
      traefik.http.routers.gbif-alert.rule: "Host(`${PUBLIC_DOMAIN:-}`)"
      traefik.http.routers.gbif-alert.entrypoints: "websecure"
      traefik.http.routers.gbif-alert.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.services.gbif-alert.loadbalancer.server.port: "8000"

  rqworker:
    image: ghcr.io/riparias/gbif-alert:${GBIF_ALERT_TAG:-1.10.0}
    pull_policy: always
    command: python manage.py rqworker default
    environment: *app-env
    networks: [default, shared]
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    restart: unless-stopped
    init: true

  scheduler:
    image: mcuadros/ofelia:0.3
    command: daemon --docker -f label=com.docker.compose.project=${COMPOSE_PROJECT_NAME:-gbif-alert}
    networks: [default]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      gbif-alert:
        condition: service_healthy
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes
    networks: [default]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgis/postgis:15-3.3
    profiles: ["bundled-db"]
    networks: [default]
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB are required ONLY when
    # the bundled-db profile is enabled. Compose interpolates env vars for
    # every service regardless of profile, so we use empty defaults here
    # (postgres itself fails at startup if creds are missing - that error
    # surfaces only when this service is actually started).
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# Networks
#
# - `default` (private): inter-stack communication for valkey, scheduler,
#   bundled `db`. Isolated; not exposed to other apps on the host.
# - `shared` (external): bridge to host-managed services like a Dokploy /
#   externally-managed Postgres. Only the app-side services (migrate,
#   gbif-alert, rqworker) need access. Defaults to `dokploy-network`
#   because Dokploy creates that automatically. Operators on other
#   platforms either run `docker network create dokploy-network` once,
#   or override `SHARED_NETWORK_NAME` in `.env` to point at their own
#   external network.
networks:
  default:
  shared:
    name: ${SHARED_NETWORK_NAME:-dokploy-network}
    external: true

volumes:
  valkey_data:
  postgres_data:
