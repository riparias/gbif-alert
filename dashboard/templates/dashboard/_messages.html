{% if messages %}
    <div style="max-width: 900px; margin: 0.5rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
        {% for message in messages %}
            <div role="alert" style="padding: 0.75rem 1rem; border-radius: 4px; border: 1px solid;
                {% if message.tags == 'success' %}background: #d1e7dd; border-color: #a3cfbb; color: #0a3622;
                {% elif message.tags == 'warning' %}background: #fff3cd; border-color: #ffe69c; color: #664d03;
                {% elif message.tags == 'error' %}background: #f8d7da; border-color: #f1aeb5; color: #58151c;
                {% else %}background: #cff4fc; border-color: #9eeaf9; color: #055160;{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
