{% load i18n %}
{% load page_fragments %}

<footer style="padding: 0.75rem 1rem; margin-top: 2rem; background-color: var(--p-primary-800); color: #fff;">
    <div style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center;">
        <div>
            {% get_page_fragment 'footer_left_col' %}
        </div>
        <div style="font-size: 0.875rem; opacity: 0.85;">
            <a href="/api-docs" style="color: #fff;">{% translate "API" %}</a><br/>
            {% translate "Latest data import:" %} <a href="{% url 'dashboard:pages:about-data' %}">#{{ latest_data_import.pk }}</a> - {{ latest_data_import.start }}<br/>
            {% translate 'This site is powered by <a href="https://github.com/riparias/gbif-alert">GBIF Alert</a> version' %} <a href="https://github.com/riparias/gbif-alert/tree/{{ git_version_number }}">{{ git_version_number }}</a>
        </div>
    </div>
</footer>
