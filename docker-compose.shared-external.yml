# Overlay for deployments where Postgres (or another dependency) lives as a
# sibling container on a pre-existing EXTERNAL Docker network - e.g. Dokploy's
# `dokploy-network`, or your own managed-DB bridge.
#
# It redefines the `shared` network (a plain Compose-managed network in the base
# file) as that external network, so the app-side services can resolve the DB by
# its container name.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.shared-external.yml up -d
#
# The named network must already exist: Dokploy creates `dokploy-network`
# automatically; on other hosts run `docker network create dokploy-network`
# once, or set SHARED_NETWORK_NAME to point at your own external network.
networks:
  shared:
    name: ${SHARED_NETWORK_NAME:-dokploy-network}
    external: true
